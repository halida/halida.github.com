<p>layout: post
title: 为什么不要帮助穷人
date: 2008-02-15 22:08:26 +0800</p>

<p>comments: true</p>

<h2>categories: </h2>

<p>帮助穷人就是断绝他们自力更生的路。</p>

<p>帮助穷人就是养懒人，养没用的人。</p>

<p>帮助穷人就是给穷人找拒绝变富的借口。</p>

<p>帮助穷人侵犯他们的人格。</p>

<p>帮助穷人就是对所有其他人说：我希望世界上的穷人更多。</p>

<p>帮助穷人就是共产主义──这就是为什么共产主义搞不好的原因。</p>

<p>帮助穷人就是让自己和穷人交朋友。</p>

<p>帮助穷人就是让自己和穷人混在一起。</p>

<p>帮助穷人就是让自己象穷人一样思考。</p>

<p>帮助穷人就是让自己变穷。</p>
