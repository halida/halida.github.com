<p>PyQt4提供了非常好的皮肤机制，可以作出非常炫的效果。其中一个功能就是qss，利用类似css的方式来配置界面。
文档在这里。 使用方法(顺便分享一下我的qss配置):</p>

</span><span class='line'><span class="nt">QWidget</span><span class="p">{</span> <span class="k">background-image</span><span class="o">:</span> <span class="sx">url(res/tex.png)</span> <span class="p">}</span>
</span><span class='line'><span class="nt">QAbstractScrollArea</span><span class="o">,</span><span class="nt">QPushButton</span> <span class="p">{</span> <span class="k">background-image</span><span class="o">:</span> <span class="n">None</span><span class="p">}</span>
</span><span class='line'>
</span><span class='line'><span class="c">/*背景色*/</span>
</span><span class='line'><span class="nt">QWidget</span><span class="p">{</span> <span class="k">background-color</span><span class="o">:</span> <span class="n">bgdColor</span> <span class="p">}</span>
</span><span class='line'><span class="nt">QPushButton</span><span class="o">,</span><span class="nt">QSplashScreen</span><span class="p">{</span><span class="k">background-color</span><span class="o">:</span> <span class="n">None</span><span class="p">}</span>
</span><span class='line'>
</span><span class='line'><span class="c">/*menu*/</span>
</span><span class='line'><span class="nt">QMenuBar</span> <span class="p">{</span>
</span><span class='line'><span class="k">background-color</span><span class="o">:</span> <span class="n">qlineargradient</span><span class="p">(</span><span class="n">x1</span><span class="o">:</span><span class="m">0</span><span class="o">,</span> <span class="n">y1</span><span class="o">:</span><span class="m">0</span><span class="o">,</span> <span class="n">x2</span><span class="o">:</span><span class="m">0</span><span class="o">,</span> <span class="n">y2</span><span class="o">:</span><span class="m">1</span><span class="o">,</span>
</span><span class='line'><span class="n">stop</span><span class="o">:</span><span class="m">0</span> <span class="n">lightgray</span><span class="o">,</span> <span class="n">stop</span><span class="o">:</span><span class="m">1</span> <span class="nb">darkgray</span><span class="p">);</span>
</span><span class='line'><span class="p">}</span>
</span><span class='line'><span class="nt">QMenu</span> <span class="p">{</span>
</span><span class='line'><span class="k">margin</span><span class="o">:</span> <span class="m">2px</span><span class="p">;</span> <span class="c">/* some spacing around the menu */</span>
</span><span class='line'><span class="p">}</span>
</span><span class='line'><span class="nt">QMenu</span><span class="o">:</span><span class="nd">:item:selected</span> <span class="p">{</span>
</span><span class='line'><span class="k">border-color</span><span class="o">:</span> <span class="n">borderColor</span><span class="p">;</span>
</span><span class='line'><span class="k">background</span><span class="o">:</span> <span class="n">rgba</span><span class="p">(</span><span class="m">100</span><span class="o">,</span> <span class="m">100</span><span class="o">,</span> <span class="m">100</span><span class="o">,</span> <span class="m">150</span><span class="p">);</span>
</span><span class='line'><span class="p">}</span>
</span><span class='line'>
</span><span class='line'><span class="c">/*按钮*/</span>
</span><span class='line'><span class="nt">QPushButton</span><span class="p">{</span>
</span><span class='line'><span class="k">border</span><span class="o">:</span> <span class="m">3px</span> <span class="k">outset</span> <span class="n">borderColor</span><span class="p">;</span>
</span><span class='line'><span class="k">background-color</span><span class="o">:</span> <span class="n">bgdColor</span><span class="p">;</span>
</span><span class='line'><span class="k">padding</span><span class="o">:</span> <span class="m">5px</span><span class="p">;</span>
</span><span class='line'><span class="k">border</span><span class="o">-</span><span class="n">radius</span><span class="o">:</span> <span class="m">5px</span><span class="p">;</span>
</span><span class='line'><span class="p">}</span>
</span><span class='line'><span class="nt">QPushButton</span><span class="nd">:checked</span> <span class="p">{</span><span class="k">border-color</span><span class="o">:</span> <span class="nb">red</span><span class="p">}</span>
</span><span class='line'><span class="c">/*醒目按下的按钮*/</span>
</span><span class='line'><span class="nt">QPushButton</span><span class="nd">:pressed</span> <span class="p">{</span><span class="k">border-color</span><span class="o">:</span> <span class="nb">green</span><span class="p">}</span>
</span><span class='line'>
</span><span class='line'><span class="c">/*QSlider*/</span>
</span><span class='line'><span class="nt">QSlider</span><span class="o">:</span><span class="nd">:groove</span> <span class="p">{</span> <span class="k">background</span><span class="o">:</span> <span class="nb">gray</span><span class="p">;</span> <span class="p">}</span>
</span><span class='line'><span class="nt">QSlider</span><span class="o">:</span><span class="nd">:groove:horizontal</span> <span class="p">{</span> <span class="k">height</span><span class="o">:</span> <span class="m">6px</span><span class="p">;}</span>
</span><span class='line'><span class="nt">QSlider</span><span class="o">:</span><span class="nd">:groove:vertical</span> <span class="p">{</span> <span class="k">width</span><span class="o">:</span> <span class="m">6px</span><span class="p">;}</span>
</span><span class='line'><span class="nt">QSlider</span><span class="o">:</span><span class="nd">:handle</span> <span class="p">{</span>
</span><span class='line'><span class="k">border</span><span class="o">:</span> <span class="m">1px</span> <span class="k">solid</span> <span class="n">borderColor</span><span class="p">;</span>
</span><span class='line'><span class="k">border</span><span class="o">-</span><span class="n">radius</span><span class="o">:</span> <span class="m">3px</span><span class="p">;</span>
</span><span class='line'><span class="k">background</span><span class="o">:</span> <span class="n">bgdColor</span><span class="p">;</span>
</span><span class='line'><span class="p">}</span>
</span><span class='line'><span class="nt">QSlider</span><span class="o">:</span><span class="nd">:handle:horizontal</span> <span class="p">{</span> <span class="k">width</span><span class="o">:</span> <span class="m">18px</span><span class="p">;</span> <span class="k">margin</span><span class="o">:</span> <span class="m">-3px</span> <span class="m">0</span> <span class="p">;</span> <span class="p">}</span>
</span><span class='line'><span class="nt">QSlider</span><span class="o">:</span><span class="nd">:handle:vertical</span> <span class="p">{</span> <span class="k">height</span><span class="o">:</span> <span class="m">18px</span><span class="p">;</span> <span class="k">margin</span><span class="o">:</span> <span class="m">0</span> <span class="m">-3px</span> <span class="p">;</span> <span class="p">}</span>
</span><span class='line'><span class="nt">QSlider</span><span class="o">:</span><span class="nd">:add-page</span> <span class="p">{</span> <span class="k">background</span><span class="o">:</span> <span class="nb">gray</span><span class="p">;</span> <span class="p">}</span>
</span><span class='line'><span class="nt">QSlider</span><span class="o">:</span><span class="nd">:sub-page</span> <span class="p">{</span> <span class="k">background</span><span class="o">:</span> <span class="nb">green</span><span class="p">;}</span>

</span><span class='line'><span class="p">}</span>

<p>上面作为字符串放在DEFAULT_STYLE里面,
然后具体的颜色在下面的python代码中设置:</p>

<figure class='code'><figcaption><span></span></figcaption><div class="highlight"><table><tr><td class="gutter"><pre class="line-numbers"><span class='line-number'>1</span>
<span class='line-number'>2</span>
<span class='line-number'>3</span>
<span class='line-number'>4</span>
<span class='line-number'>5</span>
<span class='line-number'>6</span>
<span class='line-number'>7</span>
<span class='line-number'>8</span>
<span class='line-number'>9</span>
<span class='line-number'>10</span>
<span class='line-number'>11</span>
<span class='line-number'>12</span>
</pre></td><td class='code'><pre><code class='python'><span class='line'><span class="c">#设置style里面的颜色</span>
</span><span class='line'><span class="n">COLOR_MAP</span> <span class="o">=</span> <span class="p">{</span>
</span><span class='line'><span class="s">&#39;borderColor&#39;</span><span class="p">:</span><span class="s">&#39;gray&#39;</span><span class="p">,</span>
</span><span class='line'><span class="s">&#39;bgdColor&#39;</span><span class="p">:</span><span class="s">&#39;#FCF6E4&#39;</span><span class="p">,</span>
</span><span class='line'><span class="s">&#39;contentColor&#39;</span><span class="p">:</span><span class="s">&#39;#E1EDFB&#39;</span><span class="p">,</span>
</span><span class='line'><span class="s">&#39;darkContentColor&#39;</span><span class="p">:</span><span class="s">&#39;#CDE2F8&#39;</span><span class="p">,</span>
</span><span class='line'><span class="p">}</span>
</span><span class='line'><span class="k">for</span> <span class="n">k</span><span class="p">,</span><span class="n">v</span> <span class="ow">in</span> <span class="n">COLOR_MAP</span><span class="o">.</span><span class="n">iteritems</span><span class="p">():</span>
</span><span class='line'><span class="n">DEFAULT_STYLE</span> <span class="o">=</span> <span class="n">DEFAULT_STYLE</span><span class="o">.</span><span class="n">replace</span><span class="p">(</span><span class="n">k</span><span class="p">,</span> <span class="n">v</span><span class="p">)</span>
</span><span class='line'>
</span><span class='line'><span class="n">app</span> <span class="o">=</span> <span class="n">QApplication</span><span class="p">([])</span>
</span><span class='line'><span class="n">app</span><span class="o">.</span><span class="n">setStyleSheet</span><span class="p">(</span><span class="n">DEFAULT_STYLE</span><span class="p">)</span>
</span></code></pre></td></tr></table></div></figure>
