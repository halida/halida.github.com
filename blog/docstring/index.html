<h2>注意事项</h2>

<ul>
<li>为了统一,docstring的注释用 <code>""" """</code></li>
<li>不要硬性说返回什么,因为无法确定.要表示会返回什么.</li>
<li>class的docstring要与上下分离开来,表示单独的一个部分.</li>
<li>override重载和extend扩展要注明</li>
<li>fill-paragraph断行</li>
</ul>
