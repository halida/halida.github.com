title: 为什么政府没有效率
date: 2008-02-15 22:08:26 +0800</p>

<p>comments: true</p>

<h2>categories: </h2>

<p>政府是垄断</p>

<p>垄断有垄断利益</p>

<p>为了垄断利益，更多的人要加入政府机构</p>

<p>加入政府机构要付出代价──大多数不是钱。</p>

<p>付出的代价绝大多数被浪费掉了──比如考核，年资，政治背景。</p>

<p>这些代价都要计算在政府的成本里面</p>

<p>而企业是没有加入这些代价的，成本比政府低。</p>

<p>所以政府没有效率</p>
