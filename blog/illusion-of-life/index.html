date: 2009-03-17 22:08:26 +0800</p>

<p>comments: true</p>

<h2>categories: </h2>

<p>我们可以感觉到痛苦，快乐，</p>

<p>我们可以控制肉体采取反应。</p>

<p>开始时，我们不知道肉体，但是却有感觉。</p>

<p>之后，我们通过感觉学习到了肉体的存在，</p>

<p>却又困在了肉体中。甚至认为肉体就是我们本身。</p>

<p>我们控制，感受，了解以及不了解。</p>

<p>最后，肉体被抛弃，剩下的只是我们自己。</p>

<p>－－－若干年后，我们才学会如何离开肉体生存。</p>
